# =============================================================================
# docker-publish.yml — Build & push multi-arch Docker image to GHCR.
#
# Triggered on:
#   • Every push to 'main' (tagged as :latest)
#   • Every semver tag push (e.g. v1.2.3  →  :1.2.3 + :latest)
#   • Manual workflow_dispatch
#
# Architectures: linux/amd64, linux/arm64 (Raspberry Pi 4/5 compatible)
# Registry: GitHub Container Registry (ghcr.io)
# =============================================================================

name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build multi-arch image and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for provenance attestation.
      id-token: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up QEMU for cross-platform emulation ────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Set up Docker Buildx ────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to GHCR ──────────────────────────────────────────────────
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Extract metadata (tags & labels) ────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag :latest on every push to main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag :vX.Y.Z on semver tags
            type=semver,pattern={{version}}
            # Tag :X.Y on semver tags (minor alias)
            type=semver,pattern={{major}}.{{minor}}
            # Tag the short SHA for traceability
            type=sha,prefix=sha-

      # ── 6. Build & push ────────────────────────────────────────────────────
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache to speed up rebuilds.
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── 7. Generate provenance attestation ────────────────────────────────
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name:   ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
